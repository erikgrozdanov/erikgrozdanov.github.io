<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <title>JS - First attempt</title>
    <script type="text/javascript">
        function IncValue() {
            var sum = parseInt(document.getElementById('sum').innerHTML);
            var value = parseInt(document.getElementById('number').value);
            if (value < sum) {
                value++;
            }
            document.getElementById('number').value = value;
        }

        function DecValue() {
            var sum = parseInt(document.getElementById('sum').innerHTML);
            var value = parseInt(document.getElementById('number').value);
            if (value > 1) {
                value--;
            }

            if(value == 1){
                var samplebutton = document.getElementById("decBtn");
                samplebutton.disabled = true;
            }
            
            document.getElementById('number').value = value;
            if (value < sum) {
                var samplebutton = document.getElementById("incBtn");
                samplebutton.disabled = false;
            }
        }

        function ResetValue() {
            var value = parseInt(document.getElementById('number').value);
            document.getElementById('number').value = 1;
            document.getElementById('price').innerHTML = 1.22;
            console.log(value, price)
            var samplebutton = document.getElementById("incBtn");
            samplebutton.disabled = false;
            var samplebutton1 = document.getElementById("decBtn");
            samplebutton1.disabled = true;
        }

        function incPrice() {
            var sum = parseInt(document.getElementById('sum').innerHTML);
            var value = parseInt(document.getElementById('number').value);
            var price = parseFloat(document.getElementById('price').innerHTML);
            if(value > 1){
                var samplebutton = document.getElementById("decBtn");
                samplebutton.disabled = false;
            }
            if (price == (sum - 1) * 1.22) {
                var samplebutton = document.getElementById("incBtn");
                samplebutton.disabled = true;
            }
            if (price < sum * 1.22) {
                price += 1.22;
            }
            console.log(value, price)
            document.getElementById('price').innerHTML = price.toFixed(2);
        }

        function decPrice() {
            var sum = parseInt(document.getElementById('sum').innerHTML);
            var value = parseInt(document.getElementById('number').value);
            var price = parseFloat(document.getElementById('price').innerHTML);
            if (price > 1.22) {
                price -= 1.22;
            }
            console.log(value, price)
            document.getElementById('price').innerHTML = price.toFixed(2);
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous">
    </script>

</head>

<body>
    <div class="container-fluid">
        <div class="position-absolute top-50 start-50 translate-middle">
            <img src="product.png" class="img-thumbnail" alt="..." width="220">
            <br>
            <div class="text-center my-3">
                <p><span id="sum">12</span> Available</p>
                <strong>1.22€</strong>
            </div>
            <input type="text" id="number" value="1" class="text-center form-control">
            <div class="d-flex justify-content-between my-3">
                <button type="button" class="btn btn-success" onclick="IncValue(); incPrice()"
                    id="incBtn">Increase</button>
                <button type="button" class="btn btn-danger" onclick="DecValue(); decPrice()"
                    id="decBtn" disabled>Decrease</button>
            </div>
            <p>Price: <strong><span id="price" value="0.00">1.22</span>€</strong></p>
            <div class="d-grid gap-2">
                <button type="button" class="btn btn-secondary" onclick="ResetValue()">Reset</button>
            </div>
        </div>
    </div>
</body>

</html>
